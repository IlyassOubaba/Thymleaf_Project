<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AutoLoc - Clients</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.0/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        :root{--primary:#1a3c5e;--sidebar-w:260px}
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif}
        .sidebar{width:var(--sidebar-w);min-height:100vh;position:fixed;top:0;left:0;background:linear-gradient(180deg,#1a3c5e 0%,#0d2137 100%);z-index:1000;overflow-y:auto}
        .sidebar-brand{background:rgba(255,255,255,0.05);padding:20px;border-bottom:1px solid rgba(255,255,255,0.1)}
        .sidebar-brand h5{color:#fff;margin:0;font-weight:700}
        .sidebar-brand small{color:rgba(255,255,255,0.5);font-size:11px}
        .sidebar .nav-link{color:rgba(255,255,255,0.7);padding:12px 20px;border-radius:8px;margin:2px 12px;transition:all .2s;font-size:14px}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{color:#fff;background:rgba(255,255,255,0.12)}
        .sidebar-section{padding:16px 20px 6px;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.35);font-weight:600}
        .main{margin-left:var(--sidebar-w)}
        .topbar{background:#fff;padding:14px 28px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .topbar h4{margin:0;color:var(--primary);font-weight:700;font-size:1.15rem}
        .content{padding:24px 28px}
        .table-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden}
        .table thead th{background:#f8fafc;border-bottom:2px solid #e2e8f0;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:#64748b;font-weight:600;padding:12px 16px}
        .table tbody td{padding:12px 16px;vertical-align:middle}
        .table tbody tr:hover{background:#f8fafc}
        .filter-bar{background:#fff;border-radius:12px;padding:16px 20px;border:1px solid #e2e8f0;margin-bottom:20px}
        .btn-action{width:32px;height:32px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;font-size:14px}
        .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#1a3c5e,#2563eb);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand">
        <h5><i class="bi bi-car-front-fill me-2" style="color:#e85d04"></i>AutoLoc</h5>
        <small>Agence de location</small>
    </div>
    <nav class="mt-2">
        <div class="sidebar-section">Principal</div>
        <a href="/" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>Tableau de bord</a>
        <div class="sidebar-section">Gestion</div>
        <a href="/voitures" class="nav-link"><i class="bi bi-car-front me-2"></i>Véhicules</a>
        <a href="/clients" class="nav-link active"><i class="bi bi-people me-2"></i>Clients</a>
        <a href="/locations" class="nav-link"><i class="bi bi-journal-text me-2"></i>Locations</a>
        <div class="sidebar-section">Analyse</div>
        <a href="/stats" class="nav-link"><i class="bi bi-bar-chart-line me-2"></i>Statistiques</a>
        <div class="sidebar-section">Système</div>
        <a href="/h2-console" target="_blank" class="nav-link"><i class="bi bi-database me-2"></i>Base de données</a>
    </nav>
</div>
<div class="main">
    <div class="topbar">
        <h4><i class="bi bi-people me-2" style="color:#e85d04"></i>Gestion des clients</h4>
        <a href="/clients/new" class="btn btn-sm text-white" style="background:#1a3c5e">
            <i class="bi bi-plus-lg me-1"></i>Nouveau client
        </a>
    </div>
    <div class="content">
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show"><i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show"><i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>

        <div class="filter-bar">
            <form th:action="@{/clients}" method="get" class="row g-2 align-items-end">
                <div class="col-md-6">
                    <label class="form-label fw-semibold" style="font-size:13px">Rechercher par nom</label>
                    <input type="text" name="search" class="form-control form-control-sm" style="border-radius:8px"
                           th:value="${search}" placeholder="Nom du client..."/>
                </div>
                <div class="col-md-6 d-flex gap-2">
                    <button type="submit" class="btn btn-sm text-white" style="background:#1a3c5e;border-radius:8px">
                        <i class="bi bi-search me-1"></i>Rechercher
                    </button>
                    <a href="/clients" class="btn btn-sm btn-outline-secondary" style="border-radius:8px">Réinitialiser</a>
                </div>
            </form>
        </div>

        <div class="table-card">
            <div class="d-flex align-items-center justify-content-between p-3 border-bottom">
                <h6 class="mb-0 fw-bold" style="color:#1a3c5e">
                    <i class="bi bi-list-ul me-2"></i><span th:text="${#lists.size(clients)}"></span> client(s)
                </h6>
            </div>
            <div class="table-responsive">
                <table class="table mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Client</th>
                            <th>CIN</th>
                            <th>Téléphone</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${clients}">
                            <td class="text-muted" th:text="${c.id}"></td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="avatar" th:text="${#strings.substring(c.nom,0,1)}"></div>
                                    <div class="fw-semibold" th:text="${c.nom}"></div>
                                </div>
                            </td>
                            <td><span class="font-monospace" style="font-size:13px" th:text="${c.cin}"></span></td>
                            <td th:text="${c.telephone}"></td>
                            <td>
                                <div class="d-flex gap-1">
                                    <a th:href="@{/clients/edit/{id}(id=${c.id})}" class="btn btn-action btn-outline-primary" title="Modifier"><i class="bi bi-pencil"></i></a>
                                    <a th:href="@{/clients/delete/{id}(id=${c.id})}" class="btn btn-action btn-outline-danger"
                                       onclick="return confirm('Supprimer ce client ?')" title="Supprimer">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(clients)}">
                            <td colspan="5" class="text-center text-muted py-5">
                                <i class="bi bi-people" style="font-size:2rem;opacity:.3"></i>
                                <div class="mt-2">Aucun client trouvé</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
