<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AutoLoca - Client</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.0/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        :root{--primary:#1a3c5e;--sidebar-w:260px}
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif}
        .sidebar{width:var(--sidebar-w);min-height:100vh;position:fixed;top:0;left:0;background:linear-gradient(180deg,#1a3c5e 0%,#0d2137 100%);z-index:1000;overflow-y:auto}
        .sidebar-brand{background:rgba(255,255,255,0.05);padding:20px;border-bottom:1px solid rgba(255,255,255,0.1)}
        .sidebar-brand h5{color:#fff;margin:0;font-weight:700}
        .sidebar-brand small{color:rgba(255,255,255,0.5);font-size:11px}
        .sidebar .nav-link{color:rgba(255,255,255,0.7);padding:12px 20px;border-radius:8px;margin:2px 12px;transition:all .2s;font-size:14px}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{color:#fff;background:rgba(255,255,255,0.12)}
        .sidebar-section{padding:16px 20px 6px;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.35);font-weight:600}
        .main{margin-left:var(--sidebar-w)}
        .topbar{background:#fff;padding:14px 28px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .topbar h4{margin:0;color:var(--primary);font-weight:700;font-size:1.15rem}
        .content{padding:24px 28px}
        .form-card{background:#fff;border-radius:14px;padding:28px;border:1px solid #e2e8f0;max-width:580px}
        .form-label{font-weight:600;font-size:13px;color:#374151}
        .form-control{border-radius:8px;border-color:#e2e8f0;font-size:14px}
        .form-control:focus{border-color:#1a3c5e;box-shadow:0 0 0 3px rgba(26,60,94,.1)}
        .is-invalid{border-color:#ef4444!important}
        .invalid-feedback{font-size:12px}
        .btn-submit{background:#1a3c5e;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-weight:600}
        .btn-submit:hover{background:#14304d;color:#fff}
        .section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#9ca3af;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #f1f5f9}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand">
        <h5><i class="bi bi-car-front-fill me-2" style="color:#e85d04"></i>AutoLoc</h5>
        <small>Agence de location</small>
    </div>
    <nav class="mt-2">
        <div class="sidebar-section">Principal</div>
        <a href="/" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>Tableau de bord</a>
        <div class="sidebar-section">Gestion</div>
        <a href="/voitures" class="nav-link"><i class="bi bi-car-front me-2"></i>Véhicules</a>
        <a href="/clients" class="nav-link active"><i class="bi bi-people me-2"></i>Clients</a>
        <a href="/locations" class="nav-link"><i class="bi bi-journal-text me-2"></i>Locations</a>
        <div class="sidebar-section">Analyse</div>
        <a href="/stats" class="nav-link"><i class="bi bi-bar-chart-line me-2"></i>Statistiques</a>
        <div class="sidebar-section">Système</div>
        <a href="/h2-console" target="_blank" class="nav-link"><i class="bi bi-database me-2"></i>Base de données</a>
    </nav>
</div>
<div class="main">
    <div class="topbar">
        <h4>
            <i class="bi bi-person me-2" style="color:#e85d04"></i>
            <span th:text="${client.id == null} ? 'Nouveau client' : 'Modifier le client'"></span>
        </h4>
        <a href="/clients" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Retour</a>
    </div>
    <div class="content">
        <div class="form-card">
            <div class="section-title"><i class="bi bi-person me-2"></i>Informations du client</div>
            <form th:action="@{/clients/save}" method="post" th:object="${client}">
                <input type="hidden" th:field="*{id}"/>
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Nom complet <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{nom}"
                               th:classappend="${#fields.hasErrors('nom')} ? 'is-invalid'"
                               placeholder="Prénom et Nom"/>
                        <div class="invalid-feedback" th:errors="*{nom}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">CIN <span class="text-danger">*</span></label>
                        <input type="text" class="form-control font-monospace" th:field="*{cin}"
                               th:classappend="${#fields.hasErrors('cin')} ? 'is-invalid'"
                               placeholder="ex: AB123456"/>
                        <div class="invalid-feedback" th:errors="*{cin}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Téléphone <span class="text-danger">*</span></label>
                        <input type="tel" class="form-control" th:field="*{telephone}"
                               th:classappend="${#fields.hasErrors('telephone')} ? 'is-invalid'"
                               placeholder="ex: 0661234567"/>
                        <div class="invalid-feedback" th:errors="*{telephone}"></div>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-submit">
                        <i class="bi bi-check-lg me-1"></i>
                        <span th:text="${client.id == null} ? 'Enregistrer' : 'Mettre à jour'"></span>
                    </button>
                    <a href="/clients" class="btn btn-outline-secondary" style="border-radius:8px">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
