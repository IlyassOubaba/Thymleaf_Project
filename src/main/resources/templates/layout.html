<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AutoLoca - Gestion Location Voitures</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.0/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        :root {
            --primary: #1a3c5e;
            --accent: #e85d04;
            --sidebar-w: 260px;
        }
        body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
        .sidebar {
            width: var(--sidebar-w); min-height: 100vh; position: fixed; top: 0; left: 0;
            background: linear-gradient(180deg, #1a3c5e 0%, #0d2137 100%);
            z-index: 1000; padding-top: 0; overflow-y: auto;
        }
        .sidebar-brand {
            background: rgba(255,255,255,0.05); padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-brand h5 { color: #fff; margin: 0; font-weight: 700; letter-spacing: 0.5px; }
        .sidebar-brand small { color: rgba(255,255,255,0.5); font-size: 11px; }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.7); padding: 12px 20px; border-radius: 8px;
            margin: 2px 12px; transition: all 0.2s; font-size: 14px;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            color: #fff; background: rgba(255,255,255,0.12);
        }
        .sidebar .nav-link i { width: 22px; }
        .sidebar-section { padding: 16px 20px 6px; font-size: 10px; text-transform: uppercase;
            letter-spacing: 1.5px; color: rgba(255,255,255,0.35); font-weight: 600; }
        .main { margin-left: var(--sidebar-w); padding: 0; }
        .topbar {
            background: #fff; padding: 14px 28px; border-bottom: 1px solid #e2e8f0;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .topbar h4 { margin: 0; color: var(--primary); font-weight: 700; font-size: 1.15rem; }
        .content { padding: 24px 28px; }
        .stat-card {
            background: #fff; border-radius: 12px; padding: 22px;
            border: 1px solid #e2e8f0; transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .badge-en-cours { background: #dbeafe; color: #1e40af; }
        .badge-terminee { background: #dcfce7; color: #166534; }
        .badge-annulee { background: #fee2e2; color: #991b1b; }
        .table-card { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
        .table thead th { background: #f8fafc; border-bottom: 2px solid #e2e8f0; font-size: 12px;
            text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; font-weight: 600; }
        .table tbody tr:hover { background: #f8fafc; }
        .dispo-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .dispo-oui { background: #dcfce7; color: #166534; }
        .dispo-non { background: #fee2e2; color: #991b1b; }
        .btn-primary-custom { background: var(--primary); border-color: var(--primary); color: #fff; }
        .btn-primary-custom:hover { background: #14304d; border-color: #14304d; color: #fff; }
        .alert { border-radius: 10px; }
        .form-control:focus, .form-select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,60,94,0.1); }
        .page-title { color: var(--primary); font-weight: 700; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand">
        <h5><i class="bi bi-car-front-fill me-2" style="color:#e85d04"></i>AutoLoc</h5>
        <small>Agence de location</small>
    </div>
    <nav class="mt-2">
        <div class="sidebar-section">Principal</div>
        <a href="/" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>Tableau de bord</a>
        <div class="sidebar-section">Gestion</div>
        <a href="/voitures" class="nav-link"><i class="bi bi-car-front me-2"></i>Véhicules</a>
        <a href="/clients" class="nav-link"><i class="bi bi-people me-2"></i>Clients</a>
        <a href="/locations" class="nav-link"><i class="bi bi-journal-text me-2"></i>Locations</a>
        <div class="sidebar-section">Analyse</div>
        <a href="/stats" class="nav-link"><i class="bi bi-bar-chart-line me-2"></i>Statistiques</a>
        <div class="sidebar-section">Système</div>
        <a href="/h2-console" target="_blank" class="nav-link"><i class="bi bi-database me-2"></i>Base de données</a>
    </nav>
</div>

<div class="main">
    <div class="topbar">
        <h4 th:text="${pageTitle ?: 'AutoLoc'}">AutoLoc</h4>
        <div class="d-flex align-items-center gap-3">
            <span class="text-muted" style="font-size:13px">
                <i class="bi bi-clock me-1"></i>
                <span th:text="${#temporals.format(#temporals.createNow(), 'EEEE dd MMMM yyyy')}"></span>
            </span>
        </div>
    </div>

    <div class="content">
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-3" role="alert">
            <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <th:block th:fragment="content"><!-- Content goes here --></th:block>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
    // Mark active nav link
    document.querySelectorAll('.sidebar .nav-link').forEach(link => {
        if (link.href === window.location.href) link.classList.add('active');
        else if (link.href !== window.location.origin + '/' && window.location.pathname.startsWith(new URL(link.href).pathname)) {
            link.classList.add('active');
        }
    });
</script>
</body>
</html>
